<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Turn</title>
    <script src="code.js" defer></script>

    <style>
        body {
            background-color: rgb(28, 28, 28);
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100vw;
            height: 100vh;
        }

        .game-container {
            position: relative; 
            display: flex;
            max-width: 95vw; 
            max-height: 95vh;
            aspect-ratio: 1 / 1; 
        }

        canvas {
            background-color: rgb(28, 28, 28);
            border: solid 2px grey;
            width: 100%;
            height: 100%;
            display: block;
        }

        #toolbar {
            position: absolute;
            left: 2px;
            top: 2px;
            z-index: 4;
            background-color: rgb(28, 28, 28);
            padding: 5px;
            font-family: monospace;
        }
        #toolbar button{
            background-color: grey;
            border: none;
            border-radius: 4px;
            padding: 10px;
            color: white;
        }

        #intro {
            position: absolute;
            left: 0;
            top: 0;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100vw;
            height: 100vh;
            z-index: 10;
        }

        .dialog {
            background-color: rgb(86, 86, 86);
            max-width: 300px;
            text-align: center;
            font-family: monospace;
            font-size: 20px;
            padding: 20px;
            border-radius: 20px;
            color: white;
        }

        .dialog button {
            padding: 8px 16px;
            font-family: monospace;
            font-weight: bold;
            margin-top: 15px;
            background-color: rgb(194, 194, 194);
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

    </style>

</head>
<body>
    <div class="game-container">
        <canvas id="game"></canvas>
        <div id="toolbar">
            <button onclick="pauseGame()">Pause</button>
            <button onclick="restartGame()">Restart</button>
        </div>
    </div>

    <div id="intro">
        <div class="dialog">
            Tutorial<br>
            Welcome to Color Turn! You're to play with only one key! which is 'C' or tap the screen. clicking/tapping it will rotate the player block by 90deg.<br>
            Try to match each block on top or by the side of a previous block. Goodluck!<br>
            <button onclick="playGame()">PLAY</button>

        </div>
    </div>
</body>
</html>
